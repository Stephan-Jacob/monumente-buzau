<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrimoniu Buzău - LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 500px; width: 100%; background: #e5e7eb; border-radius: 12px; }
        @media (min-height: 800px) { #map { height: 700px; } }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans">

    <header class="max-w-6xl mx-auto mb-6 flex justify-between items-center bg-indigo-900 p-4 rounded-xl shadow-lg text-white">
        <h1 class="font-bold text-xl uppercase tracking-widest">🏛️ Monumente Buzău</h1>
        <div id="status-bulb" class="flex items-center gap-2 text-xs opacity-80">
            <span class="w-3 h-3 bg-yellow-400 rounded-full animate-pulse"></span> Se încarcă harta...
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 id="uat-name" class="text-2xl font-black text-slate-800">Județul Buzău</h2>
                <p id="uat-hint" class="text-slate-500 text-sm mt-2">Apasă pe o zonă colorată de pe hartă.</p>
                
                <div id="stats-grid" class="grid grid-cols-2 gap-3 mt-6 hidden">
                    <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                        <span class="block text-[10px] font-bold text-indigo-400 uppercase">Total</span>
                        <span id="stat-total" class="text-3xl font-black text-indigo-700">0</span>
                    </div>
                    <div class="bg-amber-50 p-4 rounded-xl border border-amber-100">
                        <span class="block text-[10px] font-bold text-amber-500 uppercase">Grupa A</span>
                        <span id="stat-a" class="text-3xl font-black text-amber-700">0</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 text-xs text-slate-500">
                <p><b>Notă:</b> Culorile de pe hartă indică densitatea monumentelor (Roșu = densitate mare, Galben = mică).</p>
            </div>
        </div>

        <div class="lg:col-span-2 relative">
            <div id="map" class="shadow-inner border-2 border-white"></div>
        </div>
    </main>

    <script>
        // DATELE TALE COMPRESATE
        const stats = {"AMARU":{t:6,a:0},"BALTA ALBĂ":{t:7,a:0},"BECENI":{t:1,a:0},"BERCA":{t:19,a:13},"BISOCA":{t:3,a:3},"BOLDU":{t:1,a:0},"BOZIORU":{t:48,a:16},"BREAZA":{t:14,a:0},"BRĂDEANU":{t:1,a:0},"BRĂEŞTI":{t:7,a:0},"BUDA":{t:1,a:0},"BUZĂU":{t:82,a:19},"C. A. ROSETTI":{t:3,a:0},"C.A. ROSETTI":{t:4,a:0},"CALVINI":{t:5,a:1},"CERNĂTEŞTI":{t:14,a:0},"CHILIILE":{t:3,a:0},"CHIOJDU":{t:7,a:1},"CISLĂU":{t:8,a:0},"COCHIRLEANCA":{t:6,a:0},"COLŢI":{t:4,a:3},"COSTEŞTI":{t:7,a:0},"COZIENI":{t:12,a:0},"CĂNEŞTI":{t:1,a:0},"CĂTINA":{t:9,a:0},"FLORICA":{t:1,a:0},"GHERGHEASA":{t:8,a:0},"GHERĂSENI":{t:21,a:0},"GLODEANU-SILIŞTEA":{t:8,a:0},"GREABĂNU":{t:1,a:0},"GREBĂNU":{t:8,a:4},"GURA TEGHII":{t:1,a:0},"LARGU":{t:7,a:0},"LOPĂTARI":{t:5,a:0},"LUCIU":{t:2,a:0},"MEREI":{t:73,a:8},"MOVILA BANULUI":{t:3,a:0},"MURGEŞTI":{t:1,a:0},"MÂNZĂLEŞTI":{t:3,a:0},"MĂGURA":{t:12,a:3},"MĂRGĂRITEŞTI":{t:6,a:3},"MĂRĂCINENI":{t:1,a:0},"NEHOIU":{t:17,a:3},"NĂENI":{t:21,a:4},"ODĂILE":{t:1,a:0},"PADINA":{t:1,a:0},"PARDOŞI":{t:1,a:0},"PIETROASELE":{t:76,a:5},"PODGORIA":{t:5,a:0},"POŞTA CÂLNĂU":{t:13,a:0},"PÂRSCOV":{t:15,a:0},"PĂNĂTĂU":{t:10,a:1},"PĂTÂRLAGELE":{t:25,a:0},"RACOVIŢENI":{t:4,a:0},"RUŞEŢU":{t:1,a:0},"RÂMNICELU":{t:11,a:0},"RÂMNICU SĂRAT":{t:32,a:15},"SCORŢOASA":{t:3,a:0},"SIRIU":{t:3,a:0},"SMEENI":{t:15,a:0},"STÂLPU":{t:12,a:4},"SĂGEATA":{t:4,a:0},"SĂHĂTENI":{t:17,a:0},"SĂPOCA":{t:8,a:0},"SĂRULEŞTI":{t:5,a:0},"TISĂU":{t:17,a:5},"TOPLICENI":{t:6,a:4},"ULMENI":{t:15,a:0},"VADU PAŞII":{t:1,a:0},"VALEA RÂMNICULUI":{t:20,a:0},"VERNEŞTI":{t:40,a:10},"VINTILĂ VODĂ":{t:13,a:0},"VIPEREŞTI":{t:3,a:0},"ZIDURI":{t:25,a:0},"ZĂRNEŞTI":{t:15,a:0},"ŢINTEŞTI":{t:3,a:0}};

        // 1. Initializam harta IMEDIAT
        const map = L.map('map').setView([45.2, 26.8], 9);
        
        // Folosim OpenStreetMap (mai stabil pentru inceput)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function getColor(d) {
            return d > 50  ? '#800026' :
                   d > 20  ? '#e31a1c' :
                   d > 5   ? '#fd8d3c' :
                             '#feb24c';
        }

        // 2. Incarcam granitele (GeoJSON)
        fetch('https://raw.githubusercontent.com/geo-spatial/ro-boundaries/master/level6_uat.json')
            .then(response => {
                if (!response.ok) throw new Error('Network error');
                return response.json();
            })
            .then(data => {
                const bzData = data.features.filter(f => f.properties.county_code === 'BZ');
                
                L.geoJson(bzData, {
                    style: function(f) {
                        const val = stats[f.properties.name.toUpperCase()] ? stats[f.properties.name.toUpperCase()].t : 0;
                        return { fillColor: getColor(val), weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.75 };
                    },
                    onEachFeature: function(f, layer) {
                        layer.on('click', function() {
                            const name = f.properties.name;
                            const s = stats[name.toUpperCase()] || {t:0, a:0};
                            document.getElementById('uat-name').innerText = name;
                            document.getElementById('stat-total').innerText = s.t;
                            document.getElementById('stat-a').innerText = s.a;
                            document.getElementById('uat-hint').classList.add('hidden');
                            document.getElementById('stats-grid').classList.remove('hidden');
                        });
                        layer.bindTooltip(f.properties.name, {sticky: true});
                    }
                }).addTo(map);
                
                document.getElementById('status-bulb').innerHTML = '<span class="w-3 h-3 bg-green-500 rounded-full"></span> Date încărcate';
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status-bulb').innerHTML = '<span class="w-3 h-3 bg-red-500 rounded-full"></span> Eroare la încărcare granițe';
            });
    </script>
</body>
</html>
