<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrimoniu Buzău</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>#map { height: 600px; width: 100%; border-radius: 15px; background: #f0f0f0; }</style>
</head>
<body class="bg-slate-50 p-4">

    <div class="max-w-6xl mx-auto flex flex-col gap-6">
        <header class="bg-indigo-900 p-6 rounded-2xl shadow-xl text-white">
            <h1 class="text-2xl font-black uppercase italic">🏛️ Monumente Buzău v2.0</h1>
            <p class="text-indigo-300 text-sm">Harta punctelor de interes (Fără erori de încărcare)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <h2 id="uat-name" class="text-xl font-bold text-slate-800">Selectează un punct</h2>
                <div id="details" class="mt-4 space-y-4">
                    <p class="text-slate-500 text-sm">Dă click pe cercurile colorate de pe hartă.</p>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="map" class="shadow-inner border-4 border-white"></div>
            </div>
        </div>
    </div>

    <script>
        // Coordonate aproximative pentru centrele UAT-urilor din Buzău
        const localitati = [
            {n: "BUZĂU", lat: 45.15, lon: 26.82, t: 82, a: 19},
            {n: "RÂMNICU SĂRAT", lat: 45.38, lon: 27.05, t: 32, a: 15},
            {n: "PIETROASELE", lat: 45.09, lon: 26.58, t: 76, a: 5},
            {n: "MEREI", lat: 45.13, lon: 26.68, t: 73, a: 8},
            {n: "BOZIORU", lat: 45.38, lon: 26.50, t: 48, a: 16},
            {n: "VERNEŞTI", lat: 45.20, lon: 26.72, t: 40, a: 10},
            {n: "NEHOIU", lat: 45.42, lon: 26.30, t: 17, a: 3},
            {n: "BERCA", lat: 45.28, lon: 26.68, t: 19, a: 13},
            {n: "NĂENI", lat: 45.09, lon: 26.48, t: 21, a: 4},
            {n: "PĂTÂRLAGELE", lat: 45.32, lon: 26.35, t: 25, a: 0}
        ];

        const map = L.map('map').setView([45.25, 26.8], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function getRadius(t) { return Math.sqrt(t) * 3; }
        function getColor(a) { return a > 10 ? '#ef4444' : a > 0 ? '#f59e0b' : '#3b82f6'; }

        localitati.forEach(loc => {
            const circle = L.circleMarker([loc.lat, loc.lon], {
                radius: getRadius(loc.t),
                fillColor: getColor(loc.a),
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            circle.on('click', () => {
                document.getElementById('uat-name').innerText = loc.n;
                document.getElementById('details').innerHTML = `
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <span class="text-xs font-bold text-slate-400 uppercase">Total Monumente</span>
                        <div class="text-3xl font-black text-indigo-600">${loc.t}</div>
                    </div>
                    <div class="p-4 bg-amber-50 rounded-xl border border-amber-100">
                        <span class="text-xs font-bold text-amber-500 uppercase">Grupa A (Național)</span>
                        <div class="text-3xl font-black text-amber-600">${loc.a}</div>
                    </div>
                `;
            });

            circle.bindTooltip(`${loc.n}: ${loc.t} monumente`);
        });
    </script>
</body>
</html>
