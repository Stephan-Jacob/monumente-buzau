<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monumente Istorice Buzău</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: calc(100vh - 80px); width: 100%; border-radius: 12px; }
        .info-panel { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-indigo-900 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold uppercase tracking-wider">🏛️ Patrimoniu Buzău</h1>
        <span class="text-sm opacity-75">Sursă date: LMI / Excel Utilizator</span>
    </header>

    <div class="flex flex-col md:flex-row p-4 gap-4">
        <div class="w-full md:w-1/3 flex flex-col gap-4">
            <div class="bg-white p-6 rounded-xl shadow-md info-panel">
                <h2 id="uat-name" class="text-2xl font-black text-indigo-900 mb-2">Județul Buzău</h2>
                <p id="uat-desc" class="text-slate-600 mb-4">Dă click pe o zonă de pe hartă pentru a vedea statisticile monumentelor.</p>
                
                <div id="stats" class="grid grid-cols-2 gap-4 hidden">
                    <div class="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                        <span class="block text-xs uppercase text-indigo-400 font-bold">Total</span>
                        <span id="stat-total" class="text-2xl font-bold text-indigo-900">0</span>
                    </div>
                    <div class="bg-amber-50 p-3 rounded-lg border border-amber-100">
                        <span class="block text-xs uppercase text-amber-400 font-bold">Grupa A</span>
                        <span id="stat-a" class="text-2xl font-bold text-amber-900">0</span>
                    </div>
                    <div class="bg-emerald-50 p-3 rounded-lg border border-emerald-100">
                        <span class="block text-xs uppercase text-emerald-400 font-bold">Arheologie</span>
                        <span id="stat-arheo" class="text-2xl font-bold text-emerald-900">0</span>
                    </div>
                    <div class="bg-sky-50 p-3 rounded-lg border border-sky-100">
                        <span class="block text-xs uppercase text-sky-400 font-bold">Arhitectură</span>
                        <span id="stat-arhitect" class="text-2xl font-bold text-sky-900">0</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-md text-sm">
                <h3 class="font-bold mb-2">Densitate Monumente</h3>
                <div class="flex flex-col gap-1">
                    <div class="flex items-center gap-2"><span class="w-4 h-4 bg-[#800026] rounded"></span> Peste 50 (Critic)</div>
                    <div class="flex items-center gap-2"><span class="w-4 h-4 bg-[#E31A1C] rounded"></span> 20 - 50 (Mare)</div>
                    <div class="flex items-center gap-2"><span class="w-4 h-4 bg-[#FD8D3C] rounded"></span> 5 - 20 (Medie)</div>
                    <div class="flex items-center gap-2"><span class="w-4 h-4 bg-[#FEB24C] rounded"></span> Sub 5 (Mică)</div>
                </div>
            </div>
        </div>

        <div class="w-full md:w-2/3 h-[600px] md:h-auto">
            <div id="map" class="shadow-xl border-4 border-white"></div>
        </div>
    </div>

    <script>
        // DATELE TALE CALCULATE
        const dataStats = {
            "BUZĂU": { total: 82, a: 19, arheo: 15, arhitect: 53 },
            "PIETROASELE": { total: 76, a: 5, arheo: 71, arhitect: 2 },
            "MEREI": { total: 73, a: 8, arheo: 56, arhitect: 11 },
            "BOZIORU": { total: 48, a: 16, arheo: 17, arhitect: 31 },
            "VERNEŞTI": { total: 40, a: 10, arheo: 26, arhitect: 12 },
            "RÂMNICU SĂRAT": { total: 32, a: 15, arheo: 0, arhitect: 29 },
            "ZIDURI": { total: 25, a: 0, arheo: 25, arhitect: 0 },
            "PĂTÂRLAGELE": { total: 25, a: 0, arheo: 18, arhitect: 6 },
            "NĂENI": { total: 21, a: 4, arheo: 18, arhitect: 3 },
            "GHERĂSENI": { total: 21, a: 0, arheo: 21, arhitect: 0 }
        };

        const map = L.map('map').setView([45.25, 26.85], 9);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        function getColor(d) {
            return d > 50  ? '#800026' :
                   d > 20  ? '#E31A1C' :
                   d > 5   ? '#FD8D3C' :
                             '#FEB24C';
        }

        // Încărcare granițe automate de pe GitHub-ul geo-spatial.org
        fetch('https://raw.githubusercontent.com/geo-spatial/ro-boundaries/master/level6_uat.json')
            .then(res => res.json())
            .then(geoData => {
                const bzFeatures = geoData.features.filter(f => f.properties.county_code === 'BZ');
                
                L.geoJson(bzFeatures, {
                    style: function(feature) {
                        const name = feature.properties.name.toUpperCase();
                        const val = dataStats[name] ? dataStats[name].total : 0;
                        return {
                            fillColor: getColor(val),
                            weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.8
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        layer.on('mouseover', function() { this.setStyle({ fillOpacity: 1, weight: 3 }); });
                        layer.on('mouseout', function() { this.setStyle({ fillOpacity: 0.8, weight: 1.5 }); });
                        
                        layer.on('click', function() {
                            const name = feature.properties.name.toUpperCase();
                            const s = dataStats[name] || { total: 0, a: 0, arheo: 0, arhitect: 0 };
                            
                            document.getElementById('uat-name').innerText = feature.properties.name;
                            document.getElementById('uat-desc').classList.add('hidden');
                            document.getElementById('stats').classList.remove('hidden');
                            document.getElementById('stat-total').innerText = s.total;
                            document.getElementById('stat-a').innerText = s.a;
                            document.getElementById('stat-arheo').innerText = s.arheo;
                            document.getElementById('stat-arhitect').innerText = s.arhitect;
                        });
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
