<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrimoniul Istoric Buzău - Hartă Interactivă</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: calc(100vh - 80px); width: 100%; border-radius: 12px; z-index: 1; }
        .info-panel { transition: all 0.3s ease; }
        /* Stil personalizat pentru popup-uri */
        .leaflet-popup-content-wrapper { border-radius: 8px; font-family: sans-serif; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <header class="bg-indigo-950 text-white p-4 shadow-xl flex justify-between items-center border-b border-indigo-800">
        <div>
            <h1 class="text-xl font-black uppercase tracking-tighter">🏛️ Monumente Buzău</h1>
            <p class="text-xs text-indigo-300 font-medium">Vizualizare la nivel de UAT (Comune/Orașe)</p>
        </div>
        <div class="hidden md:block text-right">
            <span class="text-xs bg-indigo-800 px-3 py-1 rounded-full border border-indigo-700">Sursa: Date LMI procesate</span>
        </div>
    </header>

    <main class="flex flex-col md:flex-row p-4 gap-4">
        <div class="w-full md:w-80 lg:w-96 flex flex-col gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 id="uat-name" class="text-2xl font-extrabold text-indigo-950 mb-1">Județul Buzău</h2>
                <div id="instruction" class="text-slate-500 text-sm mb-4">Apasă pe o zonă de pe hartă pentru detalii specifice.</div>
                
                <div id="stats-grid" class="grid grid-cols-2 gap-3 hidden">
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <span class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Total</span>
                        <span id="stat-total" class="text-3xl font-black text-indigo-600">0</span>
                    </div>
                    <div class="bg-amber-50 p-4 rounded-xl border border-amber-100">
                        <span class="block text-[10px] uppercase tracking-widest text-amber-500 font-bold mb-1">Grupa A</span>
                        <span id="stat-a" class="text-3xl font-black text-amber-600">0</span>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                        <span class="block text-[10px] uppercase tracking-widest text-emerald-500 font-bold mb-1">Arheologie</span>
                        <span id="stat-arheo" class="text-xl font-bold text-emerald-700">0</span>
                    </div>
                    <div class="bg-sky-50 p-4 rounded-xl border border-sky-100">
                        <span class="block text-[10px] uppercase tracking-widest text-sky-500 font-bold mb-1">Arhitectură</span>
                        <span id="stat-arhitect" class="text-xl font-bold text-sky-700">0</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Densitate Monumente</h3>
                <div class="space-y-2 text-sm font-medium">
                    <div class="flex items-center gap-3"><span class="w-4 h-4 bg-[#800026] rounded-sm"></span> <span>Peste 50 (Ex: Buzău, Pietroasele)</span></div>
                    <div class="flex items-center gap-3"><span class="w-4 h-4 bg-[#E31A1C] rounded-sm"></span> <span>21 - 50</span></div>
                    <div class="flex items-center gap-3"><span class="w-4 h-4 bg-[#FD8D3C] rounded-sm"></span> <span>6 - 20</span></div>
                    <div class="flex items-center gap-3"><span class="w-4 h-4 bg-[#FEB24C] rounded-sm"></span> <span>1 - 5 monumente</span></div>
                </div>
            </div>
        </div>

        <div class="flex-1">
            <div id="map" class="shadow-2xl border-4 border-white"></div>
        </div>
    </main>

    <script>
        // DATELE TALE COMPLETE DIN EXCEL
        const dataStats = {
            "AMARU": { total: 6, a: 0, arheo: 6, arhitect: 0 },
            "BALTA ALBĂ": { total: 7, a: 0, arheo: 4, arhitect: 3 },
            "BECENI": { total: 1, a: 0, arheo: 0, arhitect: 1 },
            "BERCA": { total: 19, a: 13, arheo: 3, arhitect: 14 },
            "BISOCA": { total: 3, a: 3, arheo: 0, arhitect: 3 },
            "BOLDU": { total: 1, a: 0, arheo: 0, arhitect: 1 },
            "BOZIORU": { total: 48, a: 16, arheo: 17, arhitect: 31 },
            "BREAZA": { total: 14, a: 0, arheo: 9, arhitect: 0 },
            "BRĂDEANU": { total: 1, a: 0, arheo: 0, arhitect: 0 },
            "BRĂEŞTI": { total: 7, a: 0, arheo: 1, arhitect: 6 },
            "BUDA": { total: 1, a: 0, arheo: 0, arhitect: 1 },
            "BUZĂU": { total: 82, a: 19, arheo: 15, arhitect: 53 },
            "C. A. ROSETTI": { total: 3, a: 0, arheo: 1, arhitect: 0 },
            "C.A. ROSETTI": { total: 4, a: 0, arheo: 4, arhitect: 0 },
            "CALVINI": { total: 5, a: 1, arheo: 1, arhitect: 4 },
            "CERNĂTEŞTI": { total: 14, a: 0, arheo: 13, arhitect: 0 },
            "CHILIILE": { total: 3, a: 0, arheo: 0, arhitect: 3 },
            "CHIOJDU": { total: 7, a: 1, arheo: 0, arhitect: 6 },
            "CISLĂU": { total: 8, a: 0, arheo: 1, arhitect: 6 },
            "COCHIRLEANCA": { total: 6, a: 0, arheo: 6, arhitect: 0 },
            "COLŢI": { total: 4, a: 3, arheo: 1, arhitect: 3 },
            "COSTEŞTI": { total: 7, a: 0, arheo: 7, arhitect: 0 },
            "COZIENI": { total: 12, a: 0, arheo: 2, arhitect: 10 },
            "CĂNEŞTI": { total: 1, a: 0, arheo: 1, arhitect: 0 },
            "CĂTINA": { total: 9, a: 0, arheo: 0, arhitect: 9 },
            "FLORICA": { total: 1, a: 0, arheo: 0, arhitect: 0 },
            "GHERGHEASA": { total: 8, a: 0, arheo: 8, arhitect: 0 },
            "GHERĂSENI": { total: 21, a: 0, arheo: 21, arhitect: 0 },
            "GLODEANU-SILIŞTEA": { total: 8, a: 0, arheo: 6, arhitect: 1 },
            "GREABĂNU": { total: 1, a: 0, arheo: 0, arhitect: 1 },
            "GREBĂNU": { total: 8, a: 4, arheo: 0, arhitect: 8 },
            "GURA TEGHII": { total: 1, a: 0, arheo: 0, arhitect: 1 },
            "LARGU": { total: 7, a: 0, arheo: 6, arhitect: 1 },
            "LOPĂTARI": { total: 5, a: 0, arheo: 0, arhitect: 5 },
            "LUCIU": { total: 2, a: 0, arheo: 2, arhitect: 0 },
            "MEREI": { total: 73, a: 8, arheo: 56, arhitect: 11 },
            "MOVILA BANULUI": { total: 3, a: 0, arheo: 2, arhitect: 0 },
            "MURGEŞTI": { total: 1, a: 0, arheo: 1, arhitect: 0 },
            "MÂNZĂLEŞTI": { total: 3, a: 0, arheo: 0, arhitect: 3 },
            "MĂGURA": { total: 12, a: 3, arheo: 0, arhitect: 11 },
            "MĂRGĂRITEŞTI": { total: 6, a: 3, arheo: 0, arhitect: 6 },
            "MĂRĂCINENI": { total: 1, a: 0, arheo: 0, arhitect: 1 },
            "NEHOIU": { total: 17, a: 3, arheo: 11, arhitect: 6 },
            "NĂENI": { total: 21, a: 4, arheo: 18, arhitect: 3 },
            "ODĂILE": { total: 1, a: 0, arheo: 0, arhitect: 1 },
            "PADINA": { total: 1, a: 0, arheo: 0, arhitect: 0 },
            "PARDOŞI": { total: 1, a: 0, arheo: 0, arhitect: 1 },
            "PIETROASELE": { total: 76, a: 5, arheo: 71, arhitect: 2 },
            "PODGORIA": { total: 5, a: 0, arheo: 3, arhitect: 2 },
            "POŞTA CÂLNĂU": { total: 13, a: 0, arheo: 13, arhitect: 0 },
            "PÂRSCOV": { total: 15, a: 0, arheo: 7, arhitect: 6 },
            "PĂNĂTĂU": { total: 10, a: 1, arheo: 1, arhitect: 4 },
            "PĂTÂRLAGELE": { total: 25, a: 0, arheo: 18, arhitect: 6 },
            "RACOVIŢENI": { total: 4, a: 0, arheo: 4, arhitect: 0 },
            "RUŞEŢU": { total: 1, a: 0, arheo: 0, arhitect: 1 },
            "RÂMNICELU": { total: 11, a: 0, arheo: 9, arhitect: 2 },
            "RÂMNICU SĂRAT": { total: 32, a: 15, arheo: 0, arhitect: 29 },
            "SCORŢOASA": { total: 3, a: 0, arheo: 2, arhitect: 1 },
            "SIRIU": { total: 3, a: 0, arheo: 0, arhitect: 0 },
            "SMEENI": { total: 15, a: 0, arheo: 14, arhitect: 1 },
            "STÂLPU": { total: 12, a: 4, arheo: 7, arhitect: 5 },
            "SĂGEATA": { total: 4, a: 0, arheo: 0, arhitect: 4 },
            "SĂHĂTENI": { total: 17, a: 0, arheo: 15, arhitect: 2 },
            "SĂPOCA": { total: 8, a: 0, arheo: 5, arhitect: 3 },
            "SĂRULEŞTI": { total: 5, a: 0, arheo: 0, arhitect: 5 },
            "TISĂU": { total: 17, a: 5, arheo: 0, arhitect: 17 },
            "TOPLICENI": { total: 6, a: 4, arheo: 0, arhitect: 6 },
            "ULMENI": { total: 15, a: 0, arheo: 11, arhitect: 1 },
            "VADU PAŞII": { total: 1, a: 0, arheo: 1, arhitect: 0 },
            "VALEA RÂMNICULUI": { total: 20, a: 0, arheo: 20, arhitect: 0 },
            "VERNEŞTI": { total: 40, a: 10, arheo: 26, arhitect: 12 },
            "VINTILĂ VODĂ": { total: 13, a: 0, arheo: 0, arhitect: 13 },
            "VIPEREŞTI": { total: 3, a: 0, arheo: 3, arhitect: 0 },
            "ZIDURI": { total: 25, a: 0, arheo: 25, arhitect: 0 },
            "ZĂRNEŞTI": { total: 15, a: 0, arheo: 14, arhitect: 1 },
            "ŢINTEŞTI": { total: 3, a: 0, arheo: 2, arhitect: 1 },
        };

        // Inițializare Hartă
        const map = L.map('map').setView([45.2, 26.8], 9.5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB'
        }).addTo(map);

        // Funcție de colorare (Heatmap)
        function getColor(d) {
            return d > 50  ? '#800026' :
                   d > 20  ? '#E31A1C' :
                   d > 5   ? '#FD8D3C' :
                             '#FEB24C';
        }

        // Încărcare Granițe UAT
        fetch('https://raw.githubusercontent.com/geo-spatial/ro-boundaries/master/level6_uat.json')
            .then(res => res.json())
            .then(geoData => {
                const bzFeatures = geoData.features.filter(f => f.properties.county_code === 'BZ');
                
                L.geoJson(bzFeatures, {
                    style: function(feature) {
                        const name = feature.properties.name.toUpperCase();
                        const val = dataStats[name] ? dataStats[name].total : 0;
                        return {
                            fillColor: getColor(val),
                            weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.8
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        // Efecte vizuale la mouseover
                        layer.on('mouseover', function() { 
                            this.setStyle({ fillOpacity: 1, weight: 3, color: '#4f46e5' }); 
                        });
                        layer.on('mouseout', function() { 
                            this.setStyle({ fillOpacity: 0.8, weight: 1.5, color: 'white' }); 
                        });
                        
                        // Click pentru statistici
                        layer.on('click', function() {
                            const rawName = feature.properties.name;
                            const name = rawName.toUpperCase();
                            const s = dataStats[name] || { total: 0, a: 0, arheo: 0, arhitect: 0 };
                            
                            // Update UI
                            document.getElementById('uat-name').innerText = rawName;
                            document.getElementById('instruction').classList.add('hidden');
                            document.getElementById('stats-grid').classList.remove('hidden');
                            document.getElementById('stat-total').innerText = s.total;
                            document.getElementById('stat-a').innerText = s.a;
                            document.getElementById('stat-arheo').innerText = s.arheo;
                            document.getElementById('stat-arhitect').innerText = s.arhitect;
                        });
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
